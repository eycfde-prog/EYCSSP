<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Ranks | EYC Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RNKS.css content would be embedded here */
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
        }
        body {
            background-color: var(--dark-bg);
            color: #fff;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }
        #matrix-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        .scan-bar {
            width: 200px;
            height: 2px;
            background: var(--gold);
            box-shadow: 0 0 15px var(--gold);
            position: relative;
            overflow: hidden;
        }
        .scan-bar::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 100%;
            background: #fff;
            animation: scan 1.5s linear infinite;
        }
        @keyframes scan {
            0% { left: -50px; }
            100% { left: 200px; }
        }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .rank-header { text-align: center; margin-bottom: 40px; }
        .rank-header p { font-family: 'Orbitron'; color: var(--gold); font-size: 0.8rem; letter-spacing: 5px; }
        .rank-header h1 { font-family: 'Cinzel'; font-size: 2.5rem; margin: 10px 0; }
        .podium { display: none; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 40px; min-height: 300px; }
        .podium-item { text-align: center; flex: 1; padding: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); border-radius: 15px; transition: 0.3s; }
        .rank-1 { order: 2; transform: scale(1.1); z-index: 2; border-color: var(--gold); }
        .rank-2 { order: 1; }
        .rank-3 { order: 3; }
        .avatar-frame { width: 80px; height: 80px; margin: auto; border: 2px solid var(--gold); border-radius: 50%; padding: 5px; margin-bottom: 15px; }
        .avatar { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .crown-icon { color: var(--gold); font-size: 1.5rem; margin-bottom: 10px; }
        .tier-tag { font-family: 'Orbitron'; font-size: 0.6rem; color: #000; background: var(--gold); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        .tk-text { color: var(--gold); font-weight: bold; }
        .rank-list { display: none; flex-direction: column; gap: 10px; }
        .rank-row { display: grid; grid-template-columns: 40px 45px 1fr 80px 100px; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 10px 20px; border-radius: 12px; transition: 0.3s; }
        .rank-row:hover { background: rgba(212,175,55,0.1); }
        .profile-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
        .profile-card { background:#111; border:1px solid var(--gold); padding:40px; border-radius:20px; text-align:center; position:relative; width:90%; max-width:400px; }
        .close-profile { position:absolute; top:20px; right:20px; color:var(--gold); cursor:pointer; font-size:1.5rem; }
        .modal-avatar { width:120px; height:120px; border-radius:50%; border:3px solid var(--gold); margin-bottom:20px; }
        .modal-stats { display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:30px; }
        .stat-box { background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; }
        .stat-val { display:block; color:var(--gold); font-family:'Orbitron'; font-size:1.1rem; }
        .stat-lbl { font-size:0.7rem; color:#888; text-transform:uppercase; }
    </style>
</head>
<body>

    <div id="matrix-loader">
        <div class="scan-bar"></div>
        <p id="loader-text" style="font-family: 'Orbitron'; color: var(--gold); margin-top: 20px; font-size: 0.7rem; letter-spacing: 3px;">INITIALIZING SECURE LINK...</p>
        <div id="loading-percent" style="font-family: 'Orbitron'; color: #fff; margin-top: 10px; font-size: 0.9rem;">0%</div>
    </div>

    <div class="bg-glow"></div>

    <div class="container">
        <header class="rank-header">
            <p>EYC PREMIUM SYSTEM</p>
            <h1>HALL OF FAME</h1>
        </header>

        <div class="podium" id="podium-container"></div>
        <div class="rank-list" id="ranks-container"></div>
    </div>

    <div class="profile-overlay" id="profileOverlay">
        <div class="profile-card">
            <i class="fas fa-times close-profile" onclick="closeProfile()"></i>
            <img src="" id="m-avatar" class="modal-avatar">
            <h2 id="m-name" style="font-family:'Cinzel'; color: var(--gold);"></h2>
            <div id="m-title" class="tier-tag" style="display:inline-block; margin-top:10px;"></div>
            
            <div class="modal-stats">
                <div class="stat-box">
                    <span class="stat-val" id="m-rank">#0</span>
                    <span class="stat-lbl">Global Rank</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="m-tokens">0</span>
                    <span class="stat-lbl">Tokens (TK)</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="m-stars">0</span>
                    <span class="stat-lbl">Stars ⭐</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="m-tickets">0</span>
                    <span class="stat-lbl">Tickets 🎫</span>
                </div>
            </div>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyhM0HAV37p5ChjQyh8MBezy87EEcFgvZOShT_8fquZO0sNEK8e98JOsfyv-FJFJilL/exec';
    let allStudents = [];

    const loadingPhrases = [
        "ESTABLISHING ENCRYPTED CONNECTION...",
        "AUTHENTICATING AGENT CREDENTIALS...",
        "SYNCING ELITE DATABASE...",
        "GENERATING HALL OF FAME...",
        "ACCESS GRANTED."
    ];

    let phraseIdx = 0;
    const phraseInterval = setInterval(() => {
        if(phraseIdx < loadingPhrases.length) {
            const el = document.getElementById('loader-text');
            if(el) el.innerText = loadingPhrases[phraseIdx];
            phraseIdx++;
        }
    }, 600);

    async function fetchRanks() {
        const loader = document.getElementById('matrix-loader');
        const percentText = document.getElementById('loading-percent');
        
        try {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress > 90) progress = 90;
                percentText.innerText = Math.floor(progress) + "%";
            }, 200);

            const response = await fetch(scriptURL + "?action=leaderboard&t=" + new Date().getTime());
            const data = await response.json();
            
            clearInterval(interval);
            percentText.innerText = "100%";

            if (Array.isArray(data)) {
                data.sort((a, b) => a.Rank - b.Rank);
                renderData(data);
            }

            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 1000);
                clearInterval(phraseInterval);
            }, 500);

        } catch (error) {
            percentText.innerText = "SYSTEM ERROR";
            console.error('WOLF Error Report:', error);
        }
    }

    function renderData(data) {
        allStudents = data;
        const podiumContainer = document.getElementById('podium-container');
        const ranksContainer = document.getElementById('ranks-container');
        
        const top3 = data.slice(0, 3);
        const displayIndices = [1, 0, 2]; 

        let podiumHTML = '';
        displayIndices.forEach(idx => {
            if(!top3[idx]) return;
            const student = top3[idx];
            podiumHTML += `
                <div class="podium-item rank-${idx + 1}" onclick="showProfile('${student.Rank}')" style="cursor:pointer">
                    ${idx === 0 ? '<i class="fas fa-crown crown-icon"></i>' : ''}
                    <div class="tier-tag">${student.Title || 'ELITE'}</div>
                    <div class="avatar-frame">
                        <img src="${student.Image || 'https://via.placeholder.com/150'}" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=${student.Name}'">
                    </div>
                    <h3 style="font-family:'Cinzel'">${student.Name}</h3>
                    <div class="tk-text">${student.Tokens} TK</div>
                </div>`;
        });
        podiumContainer.innerHTML = podiumHTML;

        let listHTML = '';
        data.slice(3).forEach((student) => {
            listHTML += `
                <div class="rank-row" onclick="showProfile('${student.Rank}')" style="cursor:pointer">
                    <div style="color:var(--gold); font-weight:900;">#${student.Rank}</div>
                    <div class="avatar-frame" style="width:45px; height:45px; margin:0; border-radius:10px;">
                        <img src="${student.Image || 'https://via.placeholder.com/50'}" class="avatar" style="border-radius:8px;">
                    </div>
                    <div>
                        <div style="font-family:'Cinzel'; font-size:0.9rem;">${student.Name}</div>
                        <div style="font-size:0.6rem; color:var(--gold);">${student.Title || 'AGENT'}</div>
                    </div>
                    <div class="tk-text">${student.Tokens} <span style="font-size:0.6rem">TK</span></div>
                    <div class="row-achievement" style="font-size:0.7rem; color:#666; text-align:right;">DETAILED INTEL</div>
                </div>`;
        });
        ranksContainer.innerHTML = listHTML;
        
        podiumContainer.style.display = 'flex';
        ranksContainer.style.display = 'flex';
    }

    function showProfile(rank) {
        const student = allStudents.find(s => s.Rank == rank);
        if(!student) return;

        document.getElementById('m-avatar').src = student.Image || 'https://via.placeholder.com/150';
        document.getElementById('m-name').innerText = student.Name;
        document.getElementById('m-title').innerText = student.Title || 'ELITE AGENT';
        document.getElementById('m-rank').innerText = '#' + student.Rank;
        document.getElementById('m-tokens').innerText = student.Tokens;
        document.getElementById('m-stars').innerText = student.Stars || '0';
        document.getElementById('m-tickets').innerText = student.Tickets || '0';

        document.getElementById('profileOverlay').style.display = 'flex';
    }

    function closeProfile() {
        document.getElementById('profileOverlay').style.display = 'none';
    }

    fetchRanks();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Ranks | EYC Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="RNKS.css">
</head>
<body>

    <div id="matrix-loader">
        <div class="scan-bar"></div>
        <p style="font-family: 'Orbitron'; color: var(--gold); margin-top: 20px; font-size: 0.7rem; letter-spacing: 3px;">FETCHING ELITE DATA</p>
        <div id="loading-percent" style="font-family: 'Orbitron'; color: #fff; margin-top: 10px; font-size: 0.9rem;">0%</div>
    </div>

    <div class="bg-glow"></div>

    <div class="container">
        <header class="rank-header">
            <p>EYC PREMIUM SYSTEM</p>
            <h1>HALL OF FAME</h1>
        </header>

        <div class="podium" id="podium-container"></div>
        <div class="rank-list" id="ranks-container"></div>
    </div>

    <div class="profile-overlay" id="profileOverlay">
        <div class="profile-card">
            <i class="fas fa-times close-profile" onclick="closeProfile()"></i>
            <img src="" id="m-avatar" class="modal-avatar">
            <h2 id="m-name" style="font-family:'Cinzel'; color: var(--gold);"></h2>
            <div id="m-title" class="tier-tag" style="display:inline-block; margin-top:10px;"></div>
            
            <div class="modal-stats">
                <div class="stat-box">
                    <span class="stat-val" id="m-rank">#0</span>
                    <span class="stat-lbl">Global Rank</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="m-tokens">0</span>
                    <span class="stat-lbl">Tokens (TK)</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="m-stars">0</span>
                    <span class="stat-lbl">Stars ⭐</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="m-tickets">0</span>
                    <span class="stat-lbl">Tickets 🎫</span>
                </div>
            </div>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyhM0HAV37p5ChjQyh8MBezy87EEcFgvZOShT_8fquZO0sNEK8e98JOsfyv-FJFJilL/exec';
    let allStudents = [];

    async function fetchRanks() {
        const loader = document.getElementById('matrix-loader');
        const percentText = document.getElementById('loading-percent');
        
        try {
            // محاكاة تحميل واقعي
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress > 90) progress = 90;
                percentText.innerText = Math.floor(progress) + "%";
            }, 200);

            const response = await fetch(scriptURL + "?action=leaderboard&t=" + new Date().getTime());
            const data = await response.json();
            
            clearInterval(interval);
            percentText.innerText = "100%";

            if (Array.isArray(data)) {
                // ترتيب البيانات حسب الـ Rank احتياطياً
                data.sort((a, b) => a.Rank - b.Rank);
                renderData(data);
            }

            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 1000);
            }, 500);

        } catch (error) {
            percentText.innerText = "SYSTEM ERROR";
            console.error('WOLF Error Report:', error);
        }
    }

    function renderData(data) {
        allStudents = data;
        const podiumContainer = document.getElementById('podium-container');
        const ranksContainer = document.getElementById('ranks-container');
        
        // الثلاثة الأوائل
        const top3 = data.slice(0, 3);
        const displayIndices = [1, 0, 2]; // ترتيب الظهور: الثاني، الأول، الثالث

        let podiumHTML = '';
        displayIndices.forEach(idx => {
            if(!top3[idx]) return;
            const student = top3[idx];
            podiumHTML += `
                <div class="podium-item rank-${idx + 1}" onclick="showProfile('${student.Rank}')" style="cursor:pointer">
                    ${idx === 0 ? '<i class="fas fa-crown crown-icon"></i>' : ''}
                    <div class="tier-tag">${student.Title || 'ELITE'}</div>
                    <div class="avatar-frame">
                        <img src="${student.Image || 'https://via.placeholder.com/150'}" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=${student.Name}'">
                    </div>
                    <h3 style="font-family:'Cinzel'">${student.Name}</h3>
                    <div class="tk-text">${student.Tokens} TK</div>
                </div>`;
        });
        podiumContainer.innerHTML = podiumHTML;

        // باقي القائمة
        let listHTML = '';
        data.slice(3).forEach((student) => {
            listHTML += `
                <div class="rank-row" onclick="showProfile('${student.Rank}')" style="cursor:pointer">
                    <div style="color:var(--gold); font-weight:900;">#${student.Rank}</div>
                    <div class="avatar-frame" style="width:45px; height:45px; margin:0; border-radius:10px;">
                        <img src="${student.Image || 'https://via.placeholder.com/50'}" class="avatar" style="border-radius:8px;">
                    </div>
                    <div>
                        <div style="font-family:'Cinzel'; font-size:0.9rem;">${student.Name}</div>
                        <div style="font-size:0.6rem; color:var(--gold);">${student.Title || 'AGENT'}</div>
                    </div>
                    <div class="tk-text">${student.Tokens} <span style="font-size:0.6rem">TK</span></div>
                    <div class="row-achievement" style="font-size:0.7rem; color:#666; text-align:right;">DETAILED INTEL</div>
                </div>`;
        });
        ranksContainer.innerHTML = listHTML;
        
        podiumContainer.style.display = 'flex';
        ranksContainer.style.display = 'flex';
    }

    function showProfile(rank) {
        const student = allStudents.find(s => s.Rank == rank);
        if(!student) return;

        document.getElementById('m-avatar').src = student.Image || 'https://via.placeholder.com/150';
        document.getElementById('m-name').innerText = student.Name;
        document.getElementById('m-title').innerText = student.Title || 'ELITE AGENT';
        document.getElementById('m-rank').innerText = '#' + student.Rank;
        document.getElementById('m-tokens').innerText = student.Tokens;
        document.getElementById('m-stars').innerText = student.Stars || '0';
        document.getElementById('m-tickets').innerText = student.Tickets || '0';

        document.getElementById('profileOverlay').style.display = 'flex';
    }

    function closeProfile() {
        document.getElementById('profileOverlay').style.display = 'none';
    }

    fetchRanks();
</script>
</body>
</html>

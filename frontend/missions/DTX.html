<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dictation X | One-Shot Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #C5A028; 
            --gold-glow: rgba(197, 160, 40, 0.4);
            --error-red: #ff4444;
            --glass: rgba(10, 10, 15, 0.95); 
            --glass-border: rgba(197, 160, 40, 0.2);
        }

        body { font-family: 'Poppins', sans-serif; background: transparent; color: white; margin: 0; padding: 15px; }

        .dict-container {
            background: rgba(10, 10, 15, 0.9); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 25px; text-align: center;
            backdrop-filter: blur(20px); max-width: 800px; margin: 0 auto;
        }

        .header-x h1 { font-family: 'Orbitron'; font-size: 18px; color: var(--gold); margin-bottom: 15px; }

        /* Audio Section */
        .audio-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .audio-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 15px; position: relative; transition: 0.3s;
        }

        .play-btn {
            background: var(--gold); border: none; color: black;
            padding: 12px 25px; border-radius: 50px; font-family: 'Orbitron';
            font-size: 10px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px var(--gold-glow); transition: 0.3s;
        }

        /* Upload Section */
        .upload-section {
            margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;
        }
        .upload-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .upload-box {
            width: 80px; height: 80px; border: 2px dashed var(--glass-border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; transition: 0.3s;
        }
        .upload-box:hover { border-color: var(--gold); background: rgba(197, 160, 40, 0.05); }
        .upload-box img { width: 100%; height: 100%; object-fit: cover; }
        .upload-box span { font-size: 24px; color: var(--glass-border); }
        input[type="file"] { display: none; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center;
        }
        .warning-box {
            background: var(--glass); border: 2px solid var(--gold);
            padding: 30px; border-radius: 20px; max-width: 300px; text-align: center;
        }
        
        .locked { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .expired-msg { color: var(--error-red); font-family: 'Orbitron'; font-size: 9px; margin-top: 10px; font-weight: bold; }
        
        .mission-blueprint { width: 100%; max-height: 180px; object-fit: contain; border-radius: 15px; margin-bottom: 20px; background: #000; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

<div class="dict-container">
    <div class="header-x">
        <h1 id="task-title">DX-ONE SHOT</h1>
    </div>

    <img id="mission-img" src="" class="mission-blueprint">

    <div class="audio-section">
        <div class="audio-card" id="cardSlow">
            <div style="font-size: 10px; margin-bottom: 15px; font-family: 'Orbitron'; color: var(--gold);">ANALYTICAL (Slow)</div>
            <button id="btnSlow" class="play-btn" onclick="confirmPlay('slow')">▶ START SIGNAL</button>
            <audio id="slowAudio" onended="onAudioEnded('slow')"></audio>
        </div>

        <div class="audio-card" id="cardNormal">
            <div style="font-size: 10px; margin-bottom: 15px; font-family: 'Orbitron'; color: var(--gold);">REAL-TIME (Normal)</div>
            <button id="btnNormal" class="play-btn" onclick="confirmPlay('normal')">▶ START SIGNAL</button>
            <audio id="normalAudio" onended="onAudioEnded('normal')"></audio>
        </div>
    </div>

    <div class="upload-section">
        <div style="font-family: 'Orbitron'; font-size: 10px; color: var(--gold); margin-bottom: 15px;">UPLOAD YOUR EVIDENCE (1-3 IMAGES)</div>
        <div class="upload-grid">
            <label class="upload-box" id="box1">
                <input type="file" accept="image/*" onchange="previewImage(this, 1)">
                <span id="plus1">+</span>
                <img id="img1" style="display:none">
            </label>
            <label class="upload-box" id="box2">
                <input type="file" accept="image/*" onchange="previewImage(this, 2)">
                <span id="plus2">+</span>
                <img id="img2" style="display:none">
            </label>
            <label class="upload-box" id="box3">
                <input type="file" accept="image/*" onchange="previewImage(this, 3)">
                <span id="plus3">+</span>
                <img id="img3" style="display:none">
            </label>
        </div>
    </div>
</div>

<div id="warningModal" class="modal-overlay">
    <div class="warning-box">
        <h2 style="font-family: 'Orbitron'; color: var(--error-red); font-size: 14px;">⚠ WARNING</h2>
        <p style="font-size: 12px; color: #ccc;">You will listen to this audio just **1 time**. No pausing.</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button style="background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;" onclick="startFinalPlay()">PLAY</button>
            <button style="background: transparent; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 5px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script>
    let currentTarget = '';
    const urlParams = new URLSearchParams(window.location.search);
    const taskNum = urlParams.get('task') || "1";
    let base64Files = [null, null, null];

    function initDictX() {
        document.getElementById('task-title').innerText = `MISSION DX-${taskNum.padStart(2, '0')}`;
        const base = "https://raw.githubusercontent.com/eycfde-prog/EYCSSP/main/frontend/eyclgos/dxaudio/";
        document.getElementById('mission-img').src = `${base}${taskNum}.png`;

        const slowAud = document.getElementById('slowAudio');
        const normAud = document.getElementById('normalAudio');
        slowAud.src = `${base}${taskNum}s.wav`;
        normAud.src = `${base}${taskNum}n.wav`;
        
        if(localStorage.getItem(`DX_${taskNum}_slow`)) lockCard('slow');
        if(localStorage.getItem(`DX_${taskNum}_normal`)) lockCard('normal');
    }

    function previewImage(input, index) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById(`img${index}`).src = e.target.result;
                document.getElementById(`img${index}`).style.display = 'block';
                document.getElementById(`plus${index}`).style.display = 'none';
                base64Files[index-1] = e.target.result;
                
                // إرسال البيانات فوراً لصفحة الأرينا لتكون جاهزة عند الضغط على سبمت
                updateArenaData();
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateArenaData() {
        // إرسال مصفوفة الصور لصفحة الأرينا
        const filteredFiles = base64Files.filter(f => f !== null);
        window.parent.postMessage({
            type: 'UPDATE_ANSWERS',
            answers: filteredFiles
        }, '*');
    }

    function confirmPlay(type) {
        currentTarget = type;
        document.getElementById('warningModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('warningModal').style.display = 'none'; }

    function startFinalPlay() {
        closeModal();
        const audio = document.getElementById(currentTarget + 'Audio');
        const btn = document.getElementById('btn' + (currentTarget.charAt(0).toUpperCase() + currentTarget.slice(1)));
        if (audio) {
            btn.style.display = 'none';
            audio.play().catch(e => { btn.style.display = 'block'; });
            localStorage.setItem(`DX_${taskNum}_${currentTarget}`, "played");
            window.parent.postMessage({ type: 'AUDIO_PLAYED', audioType: currentTarget }, '*');
        }
    }

    function onAudioEnded(type) { lockCard(type); }

    function lockCard(type) {
        const card = document.getElementById('card' + (type.charAt(0).toUpperCase() + type.slice(1)));
        const btn = document.getElementById('btn' + (type.charAt(0).toUpperCase() + type.slice(1)));
        if(btn) btn.style.display = 'none';
        card.classList.add('locked');
        if (!card.querySelector('.expired-msg')) {
            card.insertAdjacentHTML('beforeend', '<p class="expired-msg">ACCESS TERMINATED</p>');
        }
    }

    window.onload = initDictX;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYCSSP - MC Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="mcstyle.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <span>EYCSSP MC</span>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="active"><i class="fas fa-home"></i> الرئيسية</a></li>
                    <li><a href="#"><i class="fas fa-users"></i> الأعضاء</a></li>
                    <li><a href="#"><i class="fas fa-tasks"></i> المهام</a></li>
                    <li><a href="#"><i class="fas fa-chart-line"></i> الإحصائيات</a></li>
                </ul>
            </nav>
            <div class="user-profile">
                <img src="https://via.placeholder.com/40" alt="User">
                <div class="dropdown">
                    <button class="dropbtn">القائد <i class="fas fa-caret-down"></i></button>
                    <div class="dropdown-content">
                        <a href="#"><i class="fas fa-user-circle"></i> الملف الشخصي</a>
                        <a href="#"><i class="fas fa-cog"></i> الإعدادات</a>
                        <a href="#" class="logout"><i class="fas fa-sign-out-alt"></i> خروج</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        
        <section class="welcome-banner">
            <div class="welcome-text">
                <h1>أهلاً بك في لوحة تحكم MC</h1>
                <p>إدارة وتوجيه فرق العمل بكفاءة عالية</p>
            </div>
            <div class="stats-summary">
                <div class="stat-item">
                    <span class="stat-number" id="total-members">0</span>
                    <span class="stat-label">عضو</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="active-tasks">0</span>
                    <span class="stat-label">مهمة نشطة</span>
                </div>
            </div>
        </section>

        <div class="dashboard-grid">
            
            <section class="card members-section">
                <div class="card-header">
                    <h2><i class="fas fa-users"></i> قائمة الأعضاء</h2>
                    <button class="btn-add" id="add-member-btn"><i class="fas fa-plus"></i> إضافة</button>
                </div>
                <div class="table-container">
                    <table id="members-table">
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>الدور</th>
                                <th>الحالة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </section>

            <section class="card activity-section">
                <div class="card-header">
                    <h2><i class="fas fa-history"></i> النشاطات الأخيرة</h2>
                </div>
                <ul class="activity-list" id="activity-feed">
                    </ul>
            </section>

        </div>

    </main>

    <div id="member-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>إضافة عضو جديد</h3>
            <form id="member-form">
                <div class="form-group">
                    <label>الاسم:</label>
                    <input type="text" id="member-name" required>
                </div>
                <div class="form-group">
                    <label>الدور:</label>
                    <select id="member-role">
                        <option value="مطور">مطور</option>
                        <option value="مصمم">مصمم</option>
                        <option value="محلل">محلل</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">حفظ العضو</button>
            </form>
        </div>
    </div>

    <footer>
        <p>حقوق النشر &copy; 2024 EYCSSP. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="mc.js"></script>
</body>
</html>

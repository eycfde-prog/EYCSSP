<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EYC Super Stars | Elite Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #fcf6ba;
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
            --bg-deep: #050508;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --gold-bright: #fff9d0;
            --glass-border: rgba(212, 175, 55, 0.2);
            --ramadan-gold: #E29E2E;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-deep); color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* --- MeMe Chat UI Optimized --- */
        .fairy-float { 
            width: 80px !important; height: 80px !important; 
            background: none !important; box-shadow: none !important;
            position: fixed; bottom: 20px; right: 20px; z-index: 1000; cursor: pointer;
            animation: float 3s infinite ease-in-out;
        }
        .fairy-float img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px var(--ramadan-gold)); }
        
        .chat-container {
            display: flex; flex-direction: column; height: 70vh; max-height: 600px; font-family: 'Cairo', sans-serif;
        }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
        }
        .meme-msg, .user-msg {
            max-width: 85%; padding: 12px; border-radius: 15px; font-size: 0.9rem; line-height: 1.5;
            word-wrap: break-word;
        }
        .meme-msg { background: rgba(226, 158, 46, 0.1); color: #fff; align-self: flex-start; border: 1px solid var(--ramadan-gold); border-bottom-left-radius: 2px; }
        .user-msg { background: var(--gold-gradient); color: #000; align-self: flex-end; font-weight: bold; border-bottom-right-radius: 2px; }
        
        .pinned-questions { 
            display: flex; overflow-x: auto; gap: 8px; padding: 10px; 
            border-bottom: 1px solid var(--glass-border); white-space: nowrap;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .pinned-questions::-webkit-scrollbar { display: none; }

        .pin-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            color: var(--gold); padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer;
            flex-shrink: 0; transition: 0.3s;
        }
        .chat-input-area {
            display: flex; gap: 10px; padding: 15px; border-top: 1px solid var(--glass-border); background: #0a0a0f;
            align-items: center;
        }
        .chat-input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; padding: 12px; font-family: 'Cairo'; outline: none;
        }
        .voice-btn { color: var(--gold); font-size: 1.2rem; cursor: pointer; padding: 5px; }

        /* --- Galaxy Guide Overlay --- */
        .galaxy-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); z-index: 5000; display: none;
            align-items: center; justify-content: center;
        }
        .guide-modal {
            background: #050508; border: 1px solid var(--ramadan-gold); border-radius: 25px;
            width: 95%; max-width: 500px; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(226, 158, 46, 0.2); overflow: hidden;
        }
        .guide-header { padding: 15px 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: rgba(226, 158, 46, 0.05); }

        /* --- Dashboard Styles --- */
        #star-container { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at top, #0a0b14 0%, #030306 100%); }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.3; animation: pulse var(--duration) infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.5); } }
        .top-nav { position: fixed; top: 0; width: 100%; padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-icon { font-size: 1.2rem; color: var(--gold); cursor: pointer; transition: 0.3s; opacity: 0.8; }
        .nav-icon:hover { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 8px var(--gold)); }
        .hero-banner { width: 100%; padding: 100px 20px 40px; text-align: center; }
        .profile-card { position: relative; display: inline-flex; flex-direction: column; align-items: center; }
        .avatar-wrapper { position: relative; width: 120px; height: 120px; padding: 4px; background: var(--gold-gradient); border-radius: 50%; box-shadow: 0 0 30px var(--gold-glow); margin-bottom: 15px; }
        .avatar-main { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #050508; background-size: cover; background-position: center; }
        .rank-tag { position: absolute; bottom: -5px; background: #000; border: 1px solid var(--gold); padding: 2px 12px; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.65rem; color: var(--gold); letter-spacing: 1px; }
        .student-name { font-family: 'Cinzel', serif; font-size: clamp(1.4rem, 5vw, 2rem); letter-spacing: 3px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 10px; }
        .student-title { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; }
        .stats-row { display: flex; gap: 20px; margin-top: 20px; background: rgba(255,255,255,0.03); padding: 10px 25px; border-radius: 30px; border: 1px solid var(--glass-border); align-items: center; }
        .stat-icon { height: 18px; object-fit: contain; }
        .stat-item { font-family: 'Orbitron'; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .stat-item span { color: var(--gold); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 0 6% 100px; }
        .activity-card { background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 35px 15px; text-align: center; transition: 0.5s; cursor: pointer; position: relative; overflow: hidden; }
        .activity-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-icon { position: relative; z-index: 1; font-size: 2.2rem; margin-bottom: 10px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tk-activity-badge { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--gold); border: 1px solid var(--gold); padding: 2px 8px; border-radius: 5px; margin-top: 10px; display: inline-block; }
        .tab-switcher { background: #000; padding: 4px; border-radius: 15px; display: flex; border: 1px solid var(--glass-border); width: 90%; max-width: 300px; margin: 20px auto; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #666; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.65rem; letter-spacing: 2px; }
        .tab-btn.active { color: #000; background: var(--gold-gradient); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(20px); }
        .modal-content { background: #050508; border-radius: 25px; padding: 40px; width: 90%; max-width: 400px; border: 1px solid var(--glass-border); position: relative; }
        .tasks-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 30px 0; }
        .task-node { position: relative; aspect-ratio: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; overflow: hidden; }
        .btn-exit { background: transparent; border: 1px solid #444; color: #888; padding: 12px 30px; border-radius: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; transition: 0.3s; width: 100%; }
        .btn-exit:hover { border-color: var(--gold); color: var(--gold); }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-forgot { background: transparent; border: none; color: #888; font-size: 0.7rem; cursor: pointer; margin-top: 10px; text-decoration: underline; transition: 0.3s; }
        .btn-forgot:hover { color: var(--gold); }
        
        .btn-signup-pulse {
            width: 100%; margin-top: 20px; padding: 15px; border-radius: 12px; background: transparent;
            border: 2px solid var(--gold); color: var(--gold); font-weight: 900; font-family: 'Orbitron';
            cursor: pointer; text-align: center; text-decoration: none; display: block;
            animation: goldPulse 2s infinite;
        }
        @keyframes goldPulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        #mailDrawer { position: fixed; top: 0; right: -100%; width: 350px; height: 100%; background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(25px); border-left: 1px solid var(--glass-border); z-index: 3000; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); padding: 30px; overflow-y: auto; }
        #mailDrawer.active { right: 0; }
        .msg-bubble { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; margin-bottom: 10px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .msg-time { font-size: 0.6rem; color: var(--gold); display: block; margin-bottom: 5px; font-family: 'Orbitron'; }
        .msg-text { font-size: 0.8rem; color: #eee; line-height: 1.4; }

        @media (max-width: 600px) {
            .chat-container { height: 85vh; }
            .guide-modal { border-radius: 0; border: none; width: 100%; height: 100%; }
            .top-nav { padding: 15px 4%; }
        }
    </style>
</head>
<body>
    <div id="star-container"></div>
    
    <nav class="top-nav">
        <i class="fas fa-arrow-left nav-icon" onclick="window.location.href='index.html'"></i>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="notifBell" class="nav-icon" onclick="openMailbox()" style="position: relative;">
                <i class="fas fa-bell"></i>
                <span id="notifDot" style="display:none; position: absolute; top: -5px; right: -5px; width: 10px; height: 10px; background: #ff0000; border-radius: 50%; border: 2px solid var(--bg-deep); box-shadow: 0 0 10px red;"></span>
            </div>
            <i class="fas fa-power-off nav-icon" id="logoutBtn" style="display:none;" onclick="handleLogout()"></i>
        </div>
    </nav>

    <header class="hero-banner" id="heroBanner"></header>

    <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchType('season', this)">SEASON</button>
        <button class="tab-btn" onclick="switchType('royal', this)">ROYAL X</button>
    </div>

    <main><div class="grid-container" id="cardsGrid"></div></main>

    <div class="fairy-float" onclick="openMeMe()">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCSSP/4bee006c6b92a405064e5f79ee41775a0721c2fb/frontend/eyclgos/MeMe.png" alt="MeMe">
    </div>

    <div class="galaxy-overlay" id="guideOverlay">
        <div class="guide-modal" id="modalBox" style="direction: rtl;">
            <div class="guide-header">
                <span style="font-family:'Orbitron'; color:var(--gold);">MeMe AI Assistant</span>
                <i class="fas fa-times-circle" style="color:var(--ramadan-gold); font-size:1.5rem; cursor:pointer;" onclick="closeGuide()"></i>
            </div>
            <div class="chat-container">
                <div class="pinned-questions" id="pinnedArea">
                    <button class="pin-btn" onclick="sendPinned('Alike (AS)')">AS</button>
                    <button class="pin-btn" onclick="sendPinned('Label (LB)')">LB</button>
                    <button class="pin-btn" onclick="sendPinned('Golden Ear (GE)')">GE</button>
                    <button class="pin-btn" onclick="sendPinned('Grammar (GR)')">GR</button>
                    <button class="pin-btn" onclick="sendPinned('Vivid (VV)')">VV</button>
                    <button class="pin-btn" onclick="sendPinned('Seeds (SD)')">SD</button>
                    <button class="pin-btn" onclick="sendPinned('Alike X (ASX)')">ASX</button>
                    <button class="pin-btn" onclick="sendPinned('Label X (LX)')">LX</button>
                    <button class="pin-btn" onclick="sendPinned('Grammar X (GRX)')">GRX</button>
                    <button class="pin-btn" onclick="sendPinned('Dictation X (DTX)')">DTX</button>
                    <button class="pin-btn" onclick="sendPinned('Sing Sang Sung (SSSX)')">SSSX</button>
                    <button class="pin-btn" onclick="sendPinned('Emagazaine X (EMX)')">EMX</button>
                    <button class="pin-btn" onclick="sendPinned('Golden Ear X (GEX)')">GEX</button>
                    <button class="pin-btn" onclick="sendPinned('Figurative X (FX)')">FX</button>
                    <button class="pin-btn" onclick="sendPinned('Seeds X (SX)')">SX</button>
                    <button class="pin-btn" onclick="sendPinned('Vivid X (VVX)')">VVX</button>
                </div>
                <div class="chat-messages" id="chatBox">
                    <div class="meme-msg">أهلاً بك يا بطل! أنا ميمي، كيف يمكنني مساعدتك اليوم؟</div>
                </div>
                <div id="loadingChat" style="display:none; text-align:center; color:var(--gold); font-size:0.8rem; padding:10px; background: rgba(0,0,0,0.3);">
                    <i class="fas fa-spinner fa-spin"></i> جاري استدعاء البيانات...
                </div>
                <div class="chat-input-area">
                    <input type="text" id="userInput" class="chat-input" placeholder="اسأل ميمي..." onkeypress="if(event.key === 'Enter') askMeMe()">
                    <div class="voice-btn" onclick="startVoice()"><i class="fas fa-microphone"></i></div>
                    <button onclick="askMeMe()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size: 1.2rem; padding: 5px;">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2 style="font-family:'Cinzel'; color:var(--gold); text-align:center; margin-bottom:20px;">AUTHENTICATION</h2>
            <input type="email" id="loginEmail" style="width:100%; padding:15px; margin:8px 0; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid #333; color:#fff;" placeholder="EMAIL">
            <input type="password" id="loginCode" style="width:100%; padding:15px; margin:8px 0; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid #333; color:#fff;" placeholder="CODE">
            <button onclick="handleLogin()" id="loginSubmitBtn" style="width:100%; margin-top:15px; padding:15px; border-radius:12px; background:var(--gold-gradient); border:none; font-weight:900; cursor:pointer;">SIGN IN</button>
            <center><button class="btn-forgot" onclick="handleForgotCode()">Forgot your access code?</button></center>
            <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; padding-top: 10px;">
                <p style="font-size: 0.6rem; color: #666; text-align: center; font-family: 'Orbitron';">NEW AGENT?</p>
                <a href="NP.html" class="btn-signup-pulse">CREATE NEW IDENTITY</a>
            </div>
            <button class="btn-exit" style="margin-top:10px;" onclick="closeModal('loginModal')">CANCEL</button>
        </div>
    </div>

    <div id="mailDrawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-family:'Orbitron'; color:var(--gold); font-size:1.1rem;">Comms Center</h2>
            <i class="fas fa-times" onclick="closeMailbox()" style="cursor:pointer; color:var(--gold);"></i>
        </div>
        <div id="mailList"></div>
    </div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h2 id="mTitle" style="text-align:center; font-family:'Cinzel'; color:#fff; margin-bottom:20px;">MISSION</h2>
            <div class="tasks-grid" id="tGrid"></div>
            <button class="btn-exit" onclick="closeModal('taskModal')">CLOSE</button>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpfdvcXHUGfXOlBPpj-V0Q1z5WGYfYEROCrySDuNvgapBnfpgfpQJqlyzdQ1KQAfTgeg/exec"; 
    const PROFILE_URL = "https://script.google.com/macros/s/AKfycbwtZCLtKzMLI1Qo1SC8Zh0Dai7NJjC75NMK5EAZnHTds9rhLef9usnX1lWJowYP0njh/exec"; 
    const GEMINI_LINK = "https://gemini.google.com/gem/1YilbB-J3XlwZjO2qalSldKnA5u-R0DP3?usp=sharing";

    let currentUser = null;
    let isLoggedIn = false;

    const IMG = {
        tk: "https://raw.githubusercontent.com/eycfde-prog/EYCSSP/047aeca8ef0fa0d95627552cfb62fd8300531134/frontend/eyclgos/Token.png",
        star: "https://raw.githubusercontent.com/eycfde-prog/EYCSSP/047aeca8ef0fa0d95627552cfb62fd8300531134/frontend/eyclgos/Star.png",
        gt: "https://raw.githubusercontent.com/eycfde-prog/EYCSSP/047aeca8ef0fa0d95627552cfb62fd8300531134/frontend/eyclgos/GT.png"
    };

    const activities = {
        season: [
            { name: "Alike", icon: "fa-clone", code: "AS", tk: 50 },
            { name: "Label", icon: "fa-tag", code: "LB", tk: 50 },
            { name: "Golden Ear", icon: "fa-ear-listen", code: "GE", tk: 50 },
            { name: "Grammar", icon: "fa-spell-check", code: "GR", tk: 50 },
            { name: "Vivid", icon: "fa-wand-magic-sparkles", code: "VV", tk: 50 },
            { name: "Seeds", icon: "fa-seedling", code: "SD", tk: 50 }
        ],
        royal: [
            { name: "Alike X", icon: "fa-star", code: "ASX", tk: 50 },
            { name: "Label X", icon: "fa-tags", code: "LBX", tk: 50 },
            { name: "Golden Ear X", icon: "fa-ear-deaf", code: "GEX", tk: 50 },
            { name: "Grammar X", icon: "fa-pen-fancy", code: "GRX", tk: 50 },
            { name: "Vivid X", icon: "fa-wand-magic", code: "VVX", tk: 50 },
            { name: "Seeds X", icon: "fa-tree", code: "SDX", tk: 50 },
            { name: "Dictation X", icon: "fa-microphone-lines", code: "DTX", tk: 100 },
            { name: "Sing Sang Sung X", icon: "fa-music", code: "SSSX", tk: 100 },
            { name: "Elmagazine X", icon: "fa-book-open", code: "EMX", tk: 100 }
        ]
    };

    // --- 1. نظام التحديث التلقائي المصلح ---
    async function startLiveSync() {
        if (!isLoggedIn) return;

        setInterval(async () => {
            try {
                const res = await fetch(`${PROFILE_URL}?action=getProfile&email=${currentUser.email}&code=${currentUser.code}`);
                const data = await res.json();
                
                if (data.status === "success") {
                    currentUser.tokens = data.tokens;
                    currentUser.stars = data.stars;
                    currentUser.goldTickets = data.goldTickets;
                    currentUser.rank = data.rank;
                    currentUser.title = data.title;
                    
                    updateStatDisplay();
                    await syncNotifications();
                }
            } catch (e) {
                console.error("Sync Error:", e);
            }
        }, 15000);
    }

    // --- 2. تحديث أرقام الواجهة ---
    function updateStatDisplay() {
        const statsRow = document.querySelector('.stats-row');
        if (statsRow && currentUser) {
            statsRow.innerHTML = `
                <div class="stat-item"><img src="${IMG.tk}" class="stat-icon"> <span>${currentUser.tokens}</span></div>
                <div class="stat-item"><img src="${IMG.star}" class="stat-icon"> <span>${currentUser.stars}</span></div>
                <div class="stat-item"><img src="${IMG.gt}" class="stat-icon"> <span>${currentUser.goldTickets}</span></div>
            `;
        }
        if(document.querySelector('.rank-tag')) document.querySelector('.rank-tag').innerText = `RANK #${currentUser.rank}`;
        if(document.querySelector('.student-title')) document.querySelector('.student-title').innerText = currentUser.title;
    }

    // --- 3. نظام الإشعارات (الربط مع العمود N) ---
    async function syncNotifications() {
        if (!isLoggedIn) return;
        try {
            const res = await fetch(`${PROFILE_URL}?action=getMail&email=${currentUser.email}`);
            const data = await res.json();
            
            const mailList = document.getElementById('mailList');
            const notifDot = document.getElementById('notifDot');
            const bell = document.getElementById('notifBell');
            
            if(data && data.length > 0) {
                const lastMsg = data[0].text;
                const cachedMsg = localStorage.getItem('last_notif');

                if (lastMsg !== cachedMsg) {
                    notifDot.style.display = 'block';
                    if(bell) bell.classList.add('fa-bounce');
                    localStorage.setItem('last_notif', lastMsg);
                }

                mailList.innerHTML = '';
                data.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'msg-bubble';
                    div.innerHTML = `<span class="msg-time">${msg.date}</span><p class="msg-text">${msg.text}</p>`;
                    mailList.appendChild(div);
                });
            }
        } catch(e) {
            console.log("Mail Sync Error");
        }
    }

    // --- 4. وظائف الدخول والخروج ---
    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const code = document.getElementById('loginCode').value;
        const btn = document.getElementById('loginSubmitBtn');
        if(!email || !code) return alert("Fill all fields");
        
        btn.innerText = "LINKING...";
        fetch(`${PROFILE_URL}?action=getProfile&email=${email}&code=${code}`)
            .then(r => r.json()).then(res => {
                if(res.status === "success") {
                    currentUser = res; 
                    currentUser.email = email; 
                    currentUser.code = code; 
                    isLoggedIn = true;
                    localStorage.setItem('eyc_user', JSON.stringify(currentUser));
                    closeModal('loginModal'); 
                    renderHeader(); 
                    generateCards();
                    startLiveSync();
                } else alert(res.message);
                btn.innerText = "SIGN IN";
            });
    }

    function handleLogout() {
        localStorage.removeItem('eyc_user');
        location.reload();
    }

    async function handleForgotCode() {
        const email = document.getElementById('loginEmail').value;
        if (!email) { alert("Please enter your email first!"); return; }
        const btn = document.querySelector('.btn-forgot');
        btn.innerText = "SENDING...";
        try {
            const response = await fetch(`${PROFILE_URL}?action=forgotCode&email=${email}`);
            const result = await response.json();
            if (result.status === "success") alert("Code sent! Check your inbox.");
            else alert("Email not found.");
        } catch (e) { alert("Connection Error"); }
        finally { btn.innerText = "Forgot your access code?"; }
    }

    // --- 5. ميزات MeMe ---
    function openMeMe() { 
        document.getElementById('guideOverlay').style.display = 'flex'; 
        document.body.style.overflow = 'hidden';
    }
    function closeGuide() { 
        document.getElementById('guideOverlay').style.display = 'none'; 
        document.body.style.overflow = 'auto';
    }

    async function askMeMe() {
        const input = document.getElementById('userInput');
        const query = input.value.trim();
        if (!query) return;

        appendMsg(query, 'user');
        input.value = '';

        const welcomeResponses = {
            "ازيك": "بخير يا بطل! مستعدين لرحلة النهاردة؟",
            "عامل ايه": "كله تمام! متحمس جداً أشوف إنجازاتك في Arena.",
            "مين": "أنا ميمي (MeMe)، مساعدك الذكي في EYC Super Stars.. أنا هنا عشان أسهل عليك المهام!",
            "انت مين": "أنا ميمي (MeMe)، مساعدك الذكي في EYC Super Stars.. أنا هنا عشان أسهل عليك المهام!",
            "ايه دا": "دي منصة الأبطال! هنا تقدر تخلص مهامك، تجمع توكنز، وتنافس على المركز الأول.",
            "سلام": "مع السلامة يا بطل، مستنيك ترجع أقوى!",
            "شكرا": "العفو! دا واجبي يا نجم."
        };

        for (let key in welcomeResponses) {
            if (query.includes(key)) {
                setTimeout(() => {
                    appendMsg(welcomeResponses[key], 'meme');
                    appendGeminiOption();
                }, 400);
                return;
            }
        }

        const loader = document.getElementById('loadingChat');
        loader.style.display = 'block';

        try {
            const sName = currentUser ? currentUser.name : "Student";
            const res = await fetch(`${SCRIPT_URL}?action=askMeMe&query=${encodeURIComponent(query)}&studentName=${encodeURIComponent(sName)}`);
            const data = await res.json();
            
            appendMsg(data.answer || "عذراً يا بطل، لم أستطع فهم ذلك.", 'meme');
            appendGeminiOption();

        } catch (e) {
            appendMsg("يا بطل حصل مشكلة في الاتصال، جرب تاني.", 'meme');
        } finally {
            loader.style.display = 'none';
        }
    }

    function appendGeminiOption() {
        const chatBox = document.getElementById('chatBox');
        const oldBtn = document.getElementById('geminiLinkBtn');
        if(oldBtn) oldBtn.remove(); 

        const div = document.createElement('div');
        div.id = 'geminiLinkBtn';
        div.style.textAlign = "center";
        div.style.margin = "10px 0";
        div.style.animation = "slideIn 0.5s ease";
        div.innerHTML = `
            <p style="font-size:0.75rem; color:var(--gold); margin-bottom:8px; opacity:0.8;">
                ✨ لمزيد من التفاصيل أو المساعدة المتقدمة:
            </p>
            <a href="${GEMINI_LINK}" target="_blank" class="pin-btn" style="background:var(--gold-gradient); color:#000; border:none; font-weight:bold; padding:10px 25px; text-decoration:none; border-radius:20px; display:inline-block; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);">
                <i class="fas fa-robot"></i> اسأل ميمي على Gemini
            </a>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendMsg(text, type) {
        const chatBox = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = type === 'user' ? 'user-msg' : 'meme-msg';
        div.innerHTML = text.replace(/\n/g, '<br>');
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendPinned(text) {
        document.getElementById('userInput').value = text;
        askMeMe();
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ar-SA';
        recognition.start();
        recognition.onresult = (event) => {
            document.getElementById('userInput').value = event.results[0][0].transcript;
            askMeMe();
        };
    }

    // --- 6. واجهة المستخدم والتنقل ---
    function renderHeader() {
        const header = document.getElementById('heroBanner');
        if (isLoggedIn) {
            document.getElementById('logoutBtn').style.display = "block";
            header.innerHTML = `
                <div class="profile-card">
                    <div class="avatar-wrapper">
                        <div class="avatar-main" style="background-image: url('${currentUser.avatar}')"></div>
                        <div class="rank-tag">RANK #${currentUser.rank}</div>
                    </div>
                    <h1 class="student-name">${currentUser.name}</h1>
                    <p class="student-title">${currentUser.title}</p>
                    <div class="stats-row">
                        <div class="stat-item"><img src="${IMG.tk}" class="stat-icon"> <span>${currentUser.tokens}</span></div>
                        <div class="stat-item"><img src="${IMG.star}" class="stat-icon"> <span>${currentUser.stars}</span></div>
                        <div class="stat-item"><img src="${IMG.gt}" class="stat-icon"> <span>${currentUser.goldTickets}</span></div>
                    </div>
                </div>`;
            syncNotifications();
        } else {
            header.innerHTML = `<h1 class="student-name">ARENA ACCESS</h1><button class="btn-exit" style="width:auto; margin-top:20px;" onclick="openLogin()">AUTHORIZE LOGIN</button>`;
        }
    }

    function generateCards() {
        const grid = document.getElementById('cardsGrid'); grid.innerHTML = '';
        const activeTab = document.querySelector('.tab-btn.active');
        const type = activeTab && activeTab.innerText.toLowerCase().includes('royal') ? 'royal' : 'season';
        activities[type].forEach(act => {
            const card = document.createElement('div');
            card.className = 'activity-card';
            card.innerHTML = `<i class="fa-solid ${act.icon} card-icon"></i><h3>${act.name}</h3><div class="tk-activity-badge">${act.tk} TK</div>`;
            card.onclick = () => openTasks(act.name, act.code);
            grid.appendChild(card);
        });
    }

    function switchType(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        generateCards();
    }

    function openTasks(name, code) {
        document.getElementById('mTitle').innerText = name;
        const tGrid = document.getElementById('tGrid'); tGrid.innerHTML = '';
        for (let i = 1; i <= 10; i++) {
            const node = document.createElement('div');
            node.className = 'task-node'; node.innerText = i;
            node.onclick = () => {
                if (!isLoggedIn) return openLogin();
                window.location.href = `EYCArena.html?email=${currentUser.email}&act=${code}&task=${i}`;
            };
            tGrid.appendChild(node);
        }
        document.getElementById('taskModal').style.display = 'flex';
    }

    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openMailbox() { document.getElementById('mailDrawer').classList.add('active'); }
    function closeMailbox() { document.getElementById('mailDrawer').classList.remove('active'); }

    // --- 7. تهيئة الصفحة ---
    const container = document.getElementById('star-container');
    if (container) {
        for(let i=0; i<150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            container.appendChild(star);
        }
    }

    const savedUser = localStorage.getItem('eyc_user');
    if(savedUser) {
        currentUser = JSON.parse(savedUser);
        isLoggedIn = true;
        startLiveSync();
    }
    renderHeader();
    generateCards();
</script>
</body>
</html>
